{% extends "base.html" %}
{% block title %}View Wallpaper{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8 text-center">

            <div class="d-flex justify-content-start mb-4">
                <a href="{{ url_for('gallery.gallery_home') }}" class="btn btn-outline-secondary">
                    <b>&larr; Back to Gallery</b>
                </a>
            </div>

            <h2 class="mb-2"><b>{{ image.title or "Untitled Wallpaper" }}</b></h2>
            <p class="text-muted mb-4">
                Generated on {{ image.created_at.strftime("%B %d, %Y at %H:%M") }}
            </p>

            <div class="card shadow-sm mb-5 bg-dark border-secondary mx-auto" style="max-width: 350px;">
                <div class="card-body p-0">
                    <img src="{{ image.file_path }}" class="img-fluid rounded" alt="{{ image.title }}">
                </div>
            </div>

            <div class="d-flex justify-content-center gap-3 mb-5">
                <a href="{{ image.file_path }}" download="ai_wallpaper_{{ image.id }}.png" class="btn btn-primary btn-lg px-5 text-white">
                    <b>Download Wallpaper</b>
                </a>

                <a href="{{ url_for('gallery.delete_image', image_id=image.id) }}" class="btn btn-outline-danger btn-lg px-4">
                    Delete
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
